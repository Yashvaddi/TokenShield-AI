apiVersion: v1
kind: Service
metadata:
  name: {{ include "tokenshield.fullname" . }}-frontend
  labels:
    app.kubernetes.io/name: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: frontend
