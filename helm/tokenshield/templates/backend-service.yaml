apiVersion: v1
kind: Service
metadata:
  name: {{ include "tokenshield.fullname" . }}-backend
  labels:
    app.kubernetes.io/name: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: backend
