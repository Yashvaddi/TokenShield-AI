{{- if .Values.clickhouse.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tokenshield.fullname" . }}-clickhouse
  labels:
    app.kubernetes.io/name: clickhouse
spec:
  ports:
    - port: 8123
      targetPort: http
      name: http
    - port: 9000
      targetPort: tcp
      name: tcp
  selector:
    app.kubernetes.io/name: clickhouse
{{- end }}
