global:
  domain: tokenshield.local

frontend:
  replicaCount: 2
  image:
    repository: tokenshield/frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000

marketing:
  replicaCount: 2
  image:
    repository: tokenshield/marketing
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3001

backend:
  replicaCount: 3
  image:
    repository: tokenshield/backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000

worker:
  replicaCount: 2
  image:
    repository: tokenshield/backend
    tag: latest
    pullPolicy: IfNotPresent

postgres:
  enabled: true
  user: tokenshield
  password: securepassword123
  database: tokenshield_db

redis:
  enabled: true
  password: secure_redis_pass

clickhouse:
  enabled: true
  user: default
  password: secure_clickhouse_pass

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: app.tokenshield.local
      paths:
        - path: /
          pathType: Prefix
          service: frontend
    - host: api.tokenshield.local
      paths:
        - path: /
          pathType: Prefix
          service: backend
    - host: www.tokenshield.local
      paths:
        - path: /
          pathType: Prefix
          service: marketing

auth0:
  clientId: ""
  clientSecret: ""
  issuer: ""
