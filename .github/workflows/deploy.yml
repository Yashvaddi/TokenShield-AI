name: TokenShield CI/CD Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/yashvaddi/tokenshield-ai

jobs:
  test-and-lint:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -----------------------------
      # Python Setup
      # -----------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ vars.PYTHON_VERSION || '3.10' }}

      - name: Install Backend Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx aiosqlite fakeredis[aioredis]

      - name: Run Backend Tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          cd backend

          if [ -d "tests" ]; then
            python -m pytest tests/ -v --asyncio-mode=auto
          else
            echo "No tests directory found. Skipping tests."
          fi

      # -----------------------------
      # Node Setup
      # -----------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION || '20' }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Lint Frontend
        run: |
          cd frontend
          npm run lint --if-present

      - name: Build Frontend
        run: |
          cd frontend
          npm run build --if-present

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    needs: test-and-lint

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - backend
          - frontend
          - marketing

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Dockerfile Exists
        run: |
          echo "Checking Dockerfile for ${{ matrix.service }}"

          if [ ! -f "./${{ matrix.service }}/Dockerfile" ]; then
            echo "Dockerfile missing for ${{ matrix.service }}"
            exit 1
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: production

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ vars.HELM_VERSION || 'v3.12.0' }}

      - name: Create Free Local Kubernetes Cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: tokenshield-cluster

      - name: Verify Cluster Connection
        run: |
          kubectl cluster-info
          kubectl get nodes

      # OPTIONAL:
      # Use this only if your images are PRIVATE in GHCR
      - name: Create Registry Secret
        run: |
          kubectl create namespace ${{ vars.K8S_NAMESPACE || 'production' }} --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret docker-registry regcred \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --docker-email=ci@example.com \
            -n ${{ vars.K8S_NAMESPACE || 'production' }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Application with Helm
        run: |
          set -euxo pipefail

          helm upgrade --install tokenshield ./helm/tokenshield \
            --namespace ${{ vars.K8S_NAMESPACE || 'production' }} \
            --create-namespace \
            --set imagePullSecrets[0].name=regcred \
            --set backend.image.repository=${{ env.IMAGE_PREFIX }}-backend \
            --set backend.image.tag=${{ github.sha }} \
            --set frontend.image.repository=${{ env.IMAGE_PREFIX }}-frontend \
            --set frontend.image.tag=${{ github.sha }} \
            --set marketing.image.repository=${{ env.IMAGE_PREFIX }}-marketing \
            --set marketing.image.tag=${{ github.sha }} \
            --wait \
            --timeout 5m \
            --debug

      - name: Verify Deployment
        run: |
          kubectl get all -n ${{ vars.K8S_NAMESPACE || 'production' }}

      - name: Debug Failed Deployment
        if: failure()
        run: |
          echo "=== Pods ==="
          kubectl get pods -A

          echo "=== Describe Pods ==="
          kubectl describe pods -n ${{ vars.K8S_NAMESPACE || 'production' }}

          echo "=== Pod Logs ==="
          kubectl logs -n ${{ vars.K8S_NAMESPACE || 'production' }} --all-containers=true --tail=100 || true

          echo "=== Events ==="
          kubectl get events -n ${{ vars.K8S_NAMESPACE || 'production' }} \
            --sort-by=.metadata.creationTimestamp
